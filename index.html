<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wedding Runner 👰🤵</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; text-align: center; background: #fdfcfb; overflow: hidden; touch-action: none; height: 100vh; }
        #menu { padding: 15px; max-width: 400px; margin: 10px auto; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input { padding: 12px; font-size: 16px; width: 80%; margin-bottom: 10px; border: 2px solid #ddd; border-radius: 8px; }
        
        #game { display: none; position: relative; width: 100%; max-width: 600px; height: 60vh; max-height: 300px; margin: auto; background: white; overflow: hidden; border-bottom: 3px solid #333; }
        #player { position: absolute; bottom: 0; left: 40px; width: 45px; height: 45px; font-size: 35px; z-index: 10; display: flex; align-items: center; justify-content: center; }
        
        .obstacle { position: absolute; width: 40px; height: 40px; font-size: 30px; display: flex; align-items: center; justify-content: center; }
        .low { bottom: 0; }
        .high { bottom: 35%; }
        
        #score { position: absolute; top: 10px; right: 15px; font-size: 20px; font-weight: bold; background: rgba(255,255,255,0.7); padding: 2px 5px; border-radius: 5px; }
        #gameOver { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.9); color: white; z-index: 100; flex-direction: column; justify-content: center; align-items: center; }
        
        button { padding: 12px 25px; font-size: 16px; margin: 8px; border: none; border-radius: 25px; background: #ff4d6d; color: white; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #d63353; }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #d63353; }
        
        .score-row { display: flex; justify-content: space-between; padding: 6px 15px; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 14px; }
        #globalScores { margin-top: 15px; text-align: left; max-height: 150px; overflow-y: auto; }
    </style>
</head>
<body>

<div id="menu">
    <h2 style="margin-top:0">Wedding Runner 💍</h2>
    <input type="text" id="nick" placeholder="Inserisci il tuo Nome" autocomplete="off">
    <div id="error" style="color:red; display:none; font-weight:bold;">⚠️ Scrivi il nome!</div>
    
    <div style="display:flex; justify-content:center;">
        <button id="btnDonato">🤵 Donato</button>
        <button id="btnMartina">👰 Martina</button>
    </div>

    <div style="margin-top:15px; border-top:1px solid #eee; padding-top:10px;">
        <strong style="color:#ff4d6d">🏆 TOP 10 GLOBALE</strong>
        <div id="globalScores">Caricamento classifica...</div>
    </div>
</div>

<div id="game">
    <div id="score">0</div>
    <div id="player"></div>
    <div id="gameOver">
        <h1>GAME OVER!</h1>
        <div id="fScore" style="font-size:24px; margin-bottom:15px; color:#ff4d6d"></div>
        <div id="goTop10" style="width:85%; max-height:150px; overflow-y:auto; margin-bottom:15px; background:rgba(255,255,255,0.1); border-radius:10px;"></div>
        <button onclick="location.reload()">Torna al Menu</button>
    </div>
</div>

<script>
    // --- CONFIGURAZIONE ---
    const firebaseConfig = {
        apiKey: "AIzaSyAyKpdPAs3CjBswIsuuQNPsB_JzzsFTmUs",
        authDomain: "weddingrunner-20778.firebaseapp.com",
        databaseURL: "https://weddingrunner-20778-default-rtdb.firebaseio.com",
        projectId: "weddingrunner-20778",
        storageBucket: "weddingrunner-20778.firebasestorage.app",
        messagingSenderId: "478010836035",
        appId: "1:478010836035:web:ee1c7cf90c17243c7b00f6"
    };

    // Inizializza solo se Firebase è caricato
    if (typeof firebase !== 'undefined') {
        firebase.initializeApp(firebaseConfig);
        var db = firebase.database();
        loadLead("globalScores");
    } else {
        document.getElementById("globalScores").innerHTML = "Errore di connessione...";
    }

    let active = false, isJ = false, pts = 0, vel = 5, hero = "", obsList = [], gInt, sInt;
    const player = document.getElementById("player");
    const game = document.getElementById("game");

    function loadLead(targetId) {
        if (!db) return;
        db.ref('scores').orderByChild('score').limitToLast(10).once('value', (snap) => {
            let items = [];
            snap.forEach(c => { items.push(c.val()); });
            items.sort((a,b) => b.score - a.score);
            let html = "";
            items.forEach((s, i) => {
                html += `<div class="score-row"><span>${i+1}. ${s.name}</span><b>${s.score}</b></div>`;
            });
            document.getElementById(targetId).innerHTML = html || "Nessun record ancora!";
        });
    }

    function launchGame(h) {
        const name = document.getElementById("nick").value.trim();
        if(!name) { document.getElementById("error").style.display="block"; return; }
        
        hero = h;
        document.getElementById("menu").style.display = "none";
        game.style.display = "block";
        player.textContent = h === "M" ? "👰" : "🤵";
        
        active = true; pts = 0; vel = 5;
        sInt = setInterval(() => { 
            if(active) {
                pts++; 
                document.getElementById("score").innerText = pts; 
                if(pts % 150 == 0) vel += 0.5; 
            }
        }, 100);
        gInt = setInterval(spawn, 1700);
    }

    function spawn() {
        if(!active) return;
        const high = Math.random() > 0.5;
        const o = document.createElement("div");
        o.className = `obstacle ${high ? 'high' : 'low'}`;
        o.textContent = hero === "D" ? (high ? "💸" : "🍰") : (high ? "🛍️" : "💐");
        o.style.left = "100%";
        game.appendChild(o);
        obsList.push(o);

        let m = setInterval(() => {
            if(!active) { clearInterval(m); return; }
            let x = o.offsetLeft;
            if(x < -50) { 
                o.remove(); 
                obsList = obsList.filter(item => item !== o);
                clearInterval(m); 
            } else {
                o.style.left = (x - vel) + "px";
                let pb = parseInt(player.style.bottom) || 0;
                // Collisione migliorata
                if(x > 45 && x < 75) {
                    if(!high && pb < 30) endGame();
                    if(high && pb > 40) endGame();
                }
            }
        }, 20);
    }

    function jump() {
        if(isJ || !active) return;
        isJ = true;
        let p = 0;
        let jumpMax = 110;
        let up = setInterval(() => {
            if(p >= jumpMax) {
                clearInterval(up);
                let down = setInterval(() => {
                    if(p <= 0) { clearInterval(down); isJ = false; p = 0; player.style.bottom = "0"; }
                    else { p -= 6; player.style.bottom = p + "px"; }
                }, 16);
            } else { p += 6; player.style.bottom = p + "px"; }
        }, 16);
    }

    function endGame() {
        active = false; 
        clearInterval(gInt); 
        clearInterval(sInt);
        document.getElementById("gameOver").style.display = "flex";
        document.getElementById("fScore").innerText = "Punteggio: " + pts;
        
        if(db) {
            db.ref('scores').push({ name: document.getElementById("nick").value, score: pts });
            loadLead("goTop10");
        }
    }

    // --- EVENTI ---
    document.getElementById("btnDonato").addEventListener("click", () => launchGame('D'));
    document.getElementById("btnMartina").addEventListener("click", () => launchGame('M'));

    window.addEventListener("touchstart", (e) => { 
        if(active) { e.preventDefault(); jump(); } 
    }, {passive: false});
    
    window.addEventListener("mousedown", () => { 
        if(active) jump(); 
    });

    // Supporto tastiera (Space)
    window.addEventListener("keydown", (e) => {
        if(e.code === "Space" && active) jump();
    });
</script>
</body>
</html>
